task_spec:
  title: "Adjust offline factor normalization for a ranking signal"
  change_scope:
    - internal_logic
    - docs
  constraints:
    - deterministic_fixture_available
    - no_external_write
    - local_backtest_summary_only

expected_risk_profile:
  side_effect_surface: local_edit
  external_state_mutation: false
  blast_radius: low
  reversibility: easy
  rollback_quality: strong
  prod_exposure: none
  security_privacy_sensitivity: low
  validation_difficulty: low
  cross_boundary_change: []
  human_harm_or_financial_impact: low
  execution_topology: single_agent
  runtime_dependency: none
  runtime_volatility: low
  fresh_evidence_required: false
  privilege_surface: none
  data_integrity_risk: medium

expected_route_decision:
  base_mode: fast_loop
  overlays: []
  risk_level: low
  reasons:
    - deterministic_offline_quant_logic
    - no_external_state_mutation
  required_gates:
    - unit
    - fixture_regression
    - benchmark_diff_review
  forbidden_actions:
    - live_runtime_probe
    - rollout_claim
  required_artifacts:
    - local_test_log
    - benchmark_diff
  authority_requirements:
    execution_authority:
      - model
    validation_authority:
      - local_checks
    release_authority:
      - reviewer
  handoff_required_roles:
    - dev
    - review
  next_skill: mode-fast-loop

expected_acceptance_contract:
  version: 1
  authoritative_sources:
    - factor_task_spec.md
    - repo_test_policy.md
  task_type: bugfix
  risk_level: low
  required_checks:
    - unit
    - fixture_regression
    - benchmark_diff_review
  non_waivable_gates:
    - fixture_regression
  human_review_required: false
  environment_approval_required: false
  pass_thresholds:
    unit: all_green
    fixture_regression: no_unexpected_output_delta
  evidence_required:
    - local_test_log
    - benchmark_diff
  acceptance_scenarios:
    - scenario_id: local_factor_output
      goal: "normalized factor output matches deterministic fixture"
      stage: local_iteration
      required_checks:
        - unit
        - fixture_regression
      required_evidence:
        - local_test_log
      required_authority:
        - local_checks
    - scenario_id: regression_summary_ready
      goal: "benchmark diff is reviewable for downstream shared users"
      stage: independent_validation
      required_checks:
        - benchmark_diff_review
      required_evidence:
        - benchmark_diff
      required_authority:
        - reviewer
  gate_definitions:
    - gate: fixture_regression
      stage: local_iteration
      threshold: no_unexpected_output_delta
      evidence:
        - local_test_log
      authority:
        - local_checks
    - gate: benchmark_diff_review
      stage: independent_validation
      threshold: summary_present
      evidence:
        - benchmark_diff
      authority:
        - reviewer
  gate_ladder:
    - gate: fixture_regression
      stage: local_iteration
      hard_stop_on_fail: true
    - gate: benchmark_diff_review
      stage: independent_validation
      hard_stop_on_fail: true
  hard_stop_conditions:
    - deterministic_fixture_missing
    - benchmark_diff_not_reviewable
  scope_limited_success_rules:
    - local fixture regression pass does not imply shared release acceptance
  runtime_truth_rules:
    - this scenario is offline and deterministic; local evidence must not be inflated into live runtime readiness
  required_authorities:
    execution_authority:
      - model
    validation_authority:
      - local_checks
    release_authority:
      - reviewer
  evidence_freshness: stale_ok
  missing_contract_policy: fail_closed

evidence_inputs:
  - gate: unit
    source: pytest
    artifact_path: reports/unit_factor_normalization.txt
    captured_at: "2026-03-30T19:20:00+08:00"
    environment_id: local-dev
  - gate: fixture_regression
    source: benchmark_diff
    artifact_path: reports/factor_diff_summary.md
    captured_at: "2026-03-30T19:21:00+08:00"
    environment_id: local-dev

expected_gate_result:
  decision: ready_for_independent_validation
  blocker_class: none
  satisfied_gates:
    - unit
    - fixture_regression
  unsatisfied_gates:
    - benchmark_diff_review
  validation_authority_satisfied: true
  release_authority_satisfied: false
  evidence_freshness:
    status: stale_ok
    observed_at: "2026-03-30T19:21:00+08:00"
    stale_after: ""
  evidence_items:
    - gate: fixture_regression
      source: benchmark_diff
      artifact_path: reports/factor_diff_summary.md
      captured_at: "2026-03-30T19:21:00+08:00"
      environment_id: local-dev
  gate_statuses:
    - gate: fixture_regression
      scope: local_iteration
      status: pass
    - gate: benchmark_diff_review
      scope: independent_validation
      status: blocked
  degraded_but_truthful: false
  next_safe_step: "handoff to reviewer or independent validator with benchmark diff attached"
